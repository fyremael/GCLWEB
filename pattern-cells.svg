<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Cellular geometry pattern</title>
  <desc id="desc">Nested hexagonal linework with denser regions around two focal points.</desc>
  <defs>
    <pattern id="hex-large" width="120" height="104" patternUnits="userSpaceOnUse">
      <path d="M30 0H90L120 52 90 104H30L0 52Z" fill="none" stroke="#203746" stroke-width="5"/>
    </pattern>
    <pattern id="hex-medium" width="64" height="55.4" patternUnits="userSpaceOnUse">
      <path d="M16 0H48L64 27.7 48 55.4H16L0 27.7Z" fill="none" stroke="#203746" stroke-width="3.2"/>
    </pattern>
    <pattern id="hex-small" width="28" height="24.2" patternUnits="userSpaceOnUse">
      <path d="M7 0H21L28 12.1 21 24.2H7L0 12.1Z" fill="none" stroke="#203746" stroke-width="1.5"/>
    </pattern>
    <clipPath id="focus-a">
      <circle cx="146" cy="98" r="118"/>
    </clipPath>
    <clipPath id="focus-b">
      <circle cx="706" cy="454" r="126"/>
    </clipPath>
    <clipPath id="core-a">
      <circle cx="146" cy="98" r="52"/>
    </clipPath>
    <clipPath id="core-b">
      <circle cx="706" cy="454" r="56"/>
    </clipPath>
  </defs>
  <rect width="900" height="560" fill="#f2f0e8"/>
  <rect width="900" height="560" fill="url(#hex-large)"/>
  <g clip-path="url(#focus-a)">
    <rect x="-20" y="-20" width="360" height="300" fill="url(#hex-medium)"/>
  </g>
  <g clip-path="url(#focus-b)">
    <rect x="520" y="270" width="340" height="300" fill="url(#hex-medium)"/>
  </g>
  <g clip-path="url(#core-a)">
    <rect x="80" y="28" width="150" height="140" fill="url(#hex-small)"/>
  </g>
  <g clip-path="url(#core-b)">
    <rect x="650" y="394" width="150" height="140" fill="url(#hex-small)"/>
  </g>
</svg>
